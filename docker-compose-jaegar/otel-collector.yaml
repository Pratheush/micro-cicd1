receivers:
  otlp:
    protocols:
      grpc:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:

  # Traces → Jaeger
  otlp_http/jaeger:
    endpoint: http://jaeger:4318
    tls:
      insecure: true

  # Metrics → Prometheus scrape endpoint
  prometheus:
    endpoint: "0.0.0.0:8889"

  # Logs → Loki (native OTLP ingestion)
  otlp_http/loki:
    endpoint: http://loki:3100/otlp

  # Debug exporter (very useful during setup)
  debug:

service:
  pipelines:

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/jaeger, debug]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki, debug]