spring.application.name=user-service

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${random.uuid}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

bookmark.service.url= http://localhost:3331/api/bookmarks

# Enable Circuit Breaker for OpenFeign
# spring.cloud.openfeign.circuitbreaker.enabled=true

#Resilience4j Properties
# for Resilience4j health endpoint of actuator is necessary and health endpoint should be exposed and included
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always

# Service ? Service Calls : TimeLimiter, Bulkhead, CircuitBreaker, Retry BUT NO RATELIMITER
# resilience4j.timelimiter.metrics.enabled=true
resilience4j.bulkhead.metrics.enabled=true
resilience4j.circuitbreaker.metrics.enabled=true
resilience4j.retry.metrics.enabled=true


# TimeLimiter requires async return type
# Enable Circuit Breaker for Timeouts
# With this configuration, the circuit breaker will be OPEN, when the remote service is taking more than 5 seconds to send back the response.
# resilience4j.timelimiter.instances.USER-PROJECT-BOOKMARK-TL.timeoutDuration=2s

# Resilience4J Retry Properties
# Sometimes, the service can be unavailable due to a small network issue (or) any other minor issue, in those cases,
# it's better to retry the call instead of directly activating the Circuit Breaker.
# configuration will retry for a maximum of 3 times, with a wait of 5 seconds in between the retries. :: waitDuration=500ms. Retries should be fast + limited.
# resilience4j.retry.configs.USER-PROJECT-BOOKMARK-RETRY.max-attempts=3
# resilience4j.retry.configs.USER-PROJECT-BOOKMARK-RETRY.wait-duration=5s
resilience4j.retry.instances.USER-PROJECT-BOOKMARK-RETRY.max-attempts=3
resilience4j.retry.instances.USER-PROJECT-BOOKMARK-RETRY.wait-duration=300ms

# Resilience4J Bulkhead Properties
# The bulkhead will be configured to allow a maximum of 10 concurrent calls and a queue of 20 calls.
# Bulkhead Limits simultaneous Feign calls to bookmark service. It Prevents thread exhaustion. Use SEMAPHORE type for Feign. THREADPOOL bulkhead better for async clients.
# resilience4j.bulkhead.configs.USER-PROJECT-BOOKMARK-BH.max-concurrent-calls=20
# resilience4j.bulkhead.configs.USER-PROJECT-BOOKMARK-BH.max-wait-duration=0
resilience4j.bulkhead.instances.USER-PROJECT-BOOKMARK-BH.max-concurrent-calls=20
resilience4j.bulkhead.instances.USER-PROJECT-BOOKMARK-BH.max-wait-duration=0

# Resilience4J Circuit Breaker Properties
# The circuit breaker will be configured to allow a maximum of 10 concurrent calls and a queue of 20 calls.
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.register-health-indicator=true
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.sliding-window-size=10
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.USER-PROJECT-BOOKMARK-CB.permitted-number-of-calls-in-half-open-state=3

# Resilience4J RateLimiter Properties
# RateLimiter: If bookmark-service is sensitive to traffic spikes, consider enabling a rate limiter (e.g., 10 requests per second).
# The rate limiter will be configured to allow a maximum of 10 concurrent calls and a queue of 20 calls.
# resilience4j.ratelimiter.configs.default.limit-for-period=10
# resilience4j.ratelimiter.configs.default.limit-refresh-period=1s
# resilience4j.ratelimiter.instances.USER-PROJECT-BOOKMARK-RL.limit-for-period=10
# resilience4j.ratelimiter.instances.USER-PROJECT-BOOKMARK-RL.limit-refresh-period=1s

# Feign default configuration
# We can set the connection and read timeouts that apply to every Feign Client in the application via the feign.client.config.default property set in our application.yml file:
# max time to establish TCP connection
feign.client.config.default.connectTimeout=2000
#  max time to wait for response
feign.client.config.default.readTimeout=2000
# feign configure timeouts per Feign client instead of globally
feign.client.config.BOOKMARK-PROJECT.connectTimeout=2000
feign.client.config.BOOKMARK-PROJECT.readTimeout=2000

