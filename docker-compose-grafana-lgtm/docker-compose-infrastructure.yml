#Typical contents:
#  postgres
#  redis
#  kafka (if used)
#  zookeeper (if used)
#  rabbitmq (if used)

services:
  postgres:
    image: postgres:15.4-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: user_service_user
      POSTGRES_PASSWORD: userpass
    ports:
      - "5432:5432"
    volumes:
      #- postgres_data:/var/lib/postgresql/data
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network


  redis:
    image: redis:8.0.6-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      #- redis_data:/data
      - ./redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]
    networks:
      - backend-network

volumes:
  postgres_data:
  redis_data:

networks:
  backend-network:
    driver: bridge