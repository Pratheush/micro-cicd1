# Monitoring, tracing, logging stack.
# Typical Contents :
#grafana-lgtm
#otel-collector (optional)
#prometheus (if separate)
#loki
#tempo

services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'
      - '4317:4317'
      - '4318:4318'
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge